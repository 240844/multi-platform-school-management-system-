version: '3.8'

services:

  # ── MySQL Database ───────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: school_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: school_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyourpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────
  backend:
    build: ../../../school-management-gradle/school-management-gradle
    container_name: school_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/school_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yourpassword
      JWT_SECRET: ThisIsAVeryLongSecretKeyForJWTThatShouldBeChangedInProduction123!
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
