#  Server
server.port=8090

#  Database
spring.datasource.url=jdbc:mysql://localhost:3306/school_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#  JWT
jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatShouldBeChangedInProduction123!
jwt.expiration=86400000

#  Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

#  Logging
logging.level.com.schoolmanagement=DEBUG
logging.level.org.springframework.security=DEBUG
